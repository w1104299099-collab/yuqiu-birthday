<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 粒子系统倒计时</title>
    <script src="js/three.min.js"></script>
    <script src="js/tween.umd.js"></script>
    <script src="js/GLTFLoader.js"></script>
    <style>
        body {
            margin: 0;
            background-color: #000;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 50px;
            z-index: 10;
        }

        #start-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.5);
            color: #ffd700;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            pointer-events: auto;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }

        #start-btn:hover {
            background: rgba(255, 215, 0, 0.2);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.4);
            transform: scale(1.05);
        }

        #hint {
            position: absolute;
            top: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
            text-align: center;
            width: 100%;
        }

        #danmaku-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: auto;
            overflow: hidden;
            z-index: 5;
            display: none; /* 暂时隐藏弹幕系统 */
        }

        .danmaku-item {
            position: absolute;
            color: #ffd700;
            font-size: 1.2rem;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8),
                         0 0 20px rgba(255, 215, 0, 0.6),
                         0 0 30px rgba(255, 215, 0, 0.4);
            cursor: pointer;
            white-space: nowrap;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            backdrop-filter: blur(3px);
            animation: blink 1.5s ease-in-out infinite;
            transition: all 0.3s ease;
            user-select: none;
        }

        .danmaku-item:hover {
            transform: scale(1.2);
            background: rgba(255, 215, 0, 0.2);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.6);
        }

        @keyframes blink {
            0%, 100% {
                opacity: 1;
                text-shadow: 0 0 10px rgba(255, 215, 0, 0.8),
                             0 0 20px rgba(255, 215, 0, 0.6),
                             0 0 30px rgba(255, 215, 0, 0.4);
            }
            50% {
                opacity: 0.6;
                text-shadow: 0 0 5px rgba(255, 215, 0, 0.4),
                             0 0 10px rgba(255, 215, 0, 0.3),
                             0 0 15px rgba(255, 215, 0, 0.2);
            }
        }

        #stars-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: auto;
            overflow: hidden;
            z-index: 5;
        }

.star-item {
            position: absolute;
            width: 20px;
            height: 20px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s ease;
            transform-style: preserve-3d;
            user-select: none;
            pointer-events: auto;
        }

.bubble-particle {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(255,255,200,1) 50%, rgba(255,215,0,0.8) 100%);
            box-shadow: 0 0 10px rgba(255, 255, 255, 1), 0 0 20px rgba(255, 215, 0, 0.9);
            pointer-events: none;
        }

        .star-item.fade-out {
            opacity: 0 !important;
            transform: scale(0);
            transition: all 1s ease-out;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="hint" style="display: none;">点击礼物盒开始</div>
        <button id="start-btn" style="display: none;">启航</button>
    </div>

    <div id="danmaku-container"></div>

    <div id="stars-container"></div>

    <script>
        // 背景音乐循环播放逻辑
        let bgm1 = new Audio('bgm/bgm.wav');
        let bgm2 = new Audio('bgm/bgm.wav');
        let isBgm1Playing = false;
        let isBgm2Playing = false;
        let bgm1StartedNext = false;
        let bgm2StartedNext = false;

        function setupBgmLoop() {
            console.log('Setting up BGM loop');
            // 确保音频加载完成
            bgm1.addEventListener('loadedmetadata', () => {
                console.log('BGM1 loaded, duration:', bgm1.duration);
            });
            bgm2.addEventListener('loadedmetadata', () => {
                console.log('BGM2 loaded, duration:', bgm2.duration);
            });
            
            bgm1.addEventListener('timeupdate', () => handleBgmTimeUpdate(bgm1, bgm2, 'bgm1'));
            bgm2.addEventListener('timeupdate', () => handleBgmTimeUpdate(bgm2, bgm1, 'bgm2'));
            
            bgm1.addEventListener('play', () => {
                isBgm1Playing = true;
                bgm1StartedNext = false; // 重置标志位
                console.log('BGM1 started playing');
            });
            bgm2.addEventListener('play', () => {
                isBgm2Playing = true;
                bgm2StartedNext = false; // 重置标志位
                console.log('BGM2 started playing');
            });
            
            bgm1.addEventListener('ended', () => {
                isBgm1Playing = false;
                console.log('BGM1 ended');
            });
            bgm2.addEventListener('ended', () => {
                isBgm2Playing = false;
                console.log('BGM2 ended');
            });
        }

        function handleBgmTimeUpdate(currentAudio, nextAudio, audioId) {
            if (currentAudio.duration && currentAudio.currentTime >= currentAudio.duration - 7) {
                // 检查是否已经开始播放下一个音频
                if (audioId === 'bgm1' && !bgm1StartedNext) {
                    console.log(`Current BGM time: ${currentAudio.currentTime}, duration: ${currentAudio.duration}, starting next BGM`);
                    // 开始播放下一个实例
                    nextAudio.currentTime = 0;
                    nextAudio.play().catch(e => console.error('Failed to play next BGM:', e));
                    bgm1StartedNext = true;
                } else if (audioId === 'bgm2' && !bgm2StartedNext) {
                    console.log(`Current BGM time: ${currentAudio.currentTime}, duration: ${currentAudio.duration}, starting next BGM`);
                    // 开始播放下一个实例
                    nextAudio.currentTime = 0;
                    nextAudio.play().catch(e => console.error('Failed to play next BGM:', e));
                    bgm2StartedNext = true;
                }
            }
        }

        function startBgm() {
            console.log('Starting BGM');
            bgm1.play().catch(error => {
                console.error('Failed to play BGM:', error);
                // 如果自动播放失败，尝试在用户交互后播放
                document.addEventListener('click', () => {
                    bgm1.play().catch(e => console.error('Failed to play BGM on click:', e));
                }, { once: true });
            });
        }

        // 配置常量
        const BASE_PARTICLE_COUNT = 4000; // 离散状态的粒子数量
        const MAX_MODEL_PARTICLES = 8000; // 模型粒子上限数量
        const DURATION = 1000; 
        const CUBE_SIZE = 25;
        
        let scene, camera, renderer, particles, particles2, geometry, geometry2, material, material2;
        let currentState = 'random'; 
        let isTransitioning = false;
        let positions, colors;
        let currentParticleCount = BASE_PARTICLE_COUNT;
let mouseX = 0;
        let mouseY = 0;
        let targetRotationX = 0;
        let targetRotationY = 0;

        const mouseRotationConfig = {
            'model': { sensitivityX: Math.PI, sensitivityY: Math.PI * 0.1, lerpFactor: 0.05 },
            'giftBox': { sensitivityX: Math.PI, sensitivityY: Math.PI * 0.5, lerpFactor: 0.05 },
            'candle': { sensitivityX: Math.PI, sensitivityY: 0, lerpFactor: 0.05 },
            'random': { sensitivityX: Math.PI, sensitivityY: Math.PI * 0.5, lerpFactor: 0.05 },
            'cube': { sensitivityX: Math.PI, sensitivityY: Math.PI * 0.5, lerpFactor: 0.05 },
            'gift': { sensitivityX: Math.PI, sensitivityY: Math.PI * 0.5, lerpFactor: 0.05 },
            'number3': { sensitivityX: Math.PI, sensitivityY: Math.PI * 0.5, lerpFactor: 0.05 },
            'number2': { sensitivityX: Math.PI, sensitivityY: Math.PI * 0.5, lerpFactor: 0.05 },
            'number1': { sensitivityX: Math.PI, sensitivityY: Math.PI * 0.5, lerpFactor: 0.05 },
            'explode': { sensitivityX: Math.PI, sensitivityY: Math.PI * 0.5, lerpFactor: 0.05 },
            'default': { sensitivityX: Math.PI, sensitivityY: Math.PI * 0.5, lerpFactor: 0.05 }
        };

        const shapes = {
            random: null,
            cube: null,
            gift: null,
            model: null,
            giftBox: null,
            candle: null,
            number3: null,
            number2: null,
            number1: null,
            explode: null
        };

        console.log('Page loaded, initializing particle system...');
        window.onload = init;

        let danmakuAudioFiles = [];
        let danmakuItems = [];
        let currentDanmakuIndex = 0;
        const MAX_DANMAKU_ITEMS = 10;

        async function loadDanmakuFiles() {
            try {
                const response = await fetch('voice/');
                const text = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(text, 'text/html');
                const links = doc.querySelectorAll('a');
                
                danmakuAudioFiles = [];
                links.forEach(link => {
                    const href = link.getAttribute('href');
                    if (href && href.endsWith('.mp3')) {
                        const fileName = href.split('/').pop();
                        danmakuAudioFiles.push({
                            name: fileName.replace('.mp3', ''),
                            path: 'voice/' + fileName,
                            played: false
                        });
                    }
                });
                
                console.log('Loaded audio files:', danmakuAudioFiles);
                currentDanmakuIndex = 0;
                danmakuItems = [];
                // 清空容器
                const container = document.getElementById('danmaku-container');
                if (container) {
                    container.innerHTML = '';
                }
            } catch (error) {
                console.error('Failed to load voice files:', error);
            }
        }

        function showNextDanmaku() {
            if (danmakuAudioFiles.length === 0) {
                // 如果音频文件没有加载，重新加载
                loadDanmakuFiles().then(() => {
                    // 加载完成后再次尝试显示
                    setTimeout(showNextDanmaku, 100);
                });
                return;
            }
            
            if (currentDanmakuIndex >= danmakuAudioFiles.length) return;
            
            if (danmakuItems.length < MAX_DANMAKU_ITEMS) {
                const file = danmakuAudioFiles[currentDanmakuIndex];
                createDanmakuItem(file);
                currentDanmakuIndex++;
                
                // 继续显示下一个，直到达到上限
                setTimeout(showNextDanmaku, 800);
            }
        }

        function createDanmakuItem(file) {
            const container = document.getElementById('danmaku-container');
            const item = document.createElement('div');
            item.className = 'danmaku-item';
            item.textContent = file.name;
            item.dataset.path = file.path;
            
            // 随机位置
            const startY = 100 + Math.random() * (window.innerHeight - 200);
            const startX = Math.random() * (window.innerWidth - 200);
            
            // 初始状态：缩小、透明
            item.style.top = startY + 'px';
            item.style.left = startX + 'px';
            item.style.transform = 'scale(0)';
            item.style.opacity = '0';
            item.style.animation = 'none';
            
            // 动画效果：像星星一样出现
            setTimeout(() => {
                item.style.transition = 'all 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55)';
                item.style.transform = 'scale(1)';
                item.style.opacity = '1';
                item.style.animation = 'blink 1.5s ease-in-out infinite';
            }, 100);
            
            item.addEventListener('click', () => {
                playAudio(file, item);
            });
            
            container.appendChild(item);
            danmakuItems.push(item);
        }

        function playAudio(file, item) {
            if (file.played) return;
            
            const audio = new Audio(file.path);
            audio.play().catch(error => {
                console.error('Failed to play audio:', error);
            });
            
            audio.addEventListener('ended', () => {
                file.played = true;
                // 播放完毕后，慢慢隐去
                item.style.transition = 'all 1s ease-out';
                item.style.opacity = '0';
                item.style.transform = 'scale(0)';
                
                setTimeout(() => {
                    if (item.parentNode) {
                        item.parentNode.removeChild(item);
                    }
                    // 从数组中移除
                    const index = danmakuItems.indexOf(item);
                    if (index > -1) {
                        danmakuItems.splice(index, 1);
                    }
                    // 显示下一个弹幕
                    showNextDanmaku();
                }, 1000);
            });
        }

        function resetDanmaku() {
            // 检查音频文件是否已加载
            if (danmakuAudioFiles.length === 0) {
                // 如果没有加载，重新加载
                loadDanmakuFiles();
                console.log('Danmaku files not loaded, reloading...');
            } else {
                // 重置弹幕状态
                danmakuAudioFiles.forEach(file => {
                    file.played = false;
                });
                currentDanmakuIndex = 0;
                danmakuItems = [];
                // 清空容器
                const container = document.getElementById('danmaku-container');
                if (container) {
                    container.innerHTML = '';
                }
                console.log('Danmaku reset');
            }
        }

        function showDanmaku() {
            const container = document.getElementById('danmaku-container');
            container.style.display = 'block';
            // 开始逐个显示弹幕
            showNextDanmaku();
        }

        function hideDanmaku() {
            const container = document.getElementById('danmaku-container');
            container.style.display = 'none';
        }

        function canEnterCountdown() {
            // 检查是否所有音频都已播放完毕
            return starAudioFiles.every(file => file.played);
        }

        // 星星系统
        let starAudioFiles = [];
        let starItems = [];
        let currentStarIndex = 0;
        const MAX_STAR_ITEMS = 10;
        const STAR_ORBIT_RADIUS = 450; // 扩大1.5倍半径
        let starAnimationId = null;

        function initStarSystem() {
            starAudioFiles = [...danmakuAudioFiles]; // 复用音频文件列表
            currentStarIndex = 0;
            starItems = [];
            // 清空容器
            const container = document.getElementById('stars-container');
            if (container) {
                container.innerHTML = '';
            }
            console.log('Star system initialized');
        }

        function showNextStar() {
            if (currentStarIndex >= starAudioFiles.length) return;
            
            if (starItems.length < MAX_STAR_ITEMS) {
                const file = starAudioFiles[currentStarIndex];
                createStarItem(file);
                currentStarIndex++;
                
                // 继续显示下一个，直到达到上限
                setTimeout(showNextStar, 800);
            }
        }

function createStarItem(file) {
            const container = document.getElementById('stars-container');
            const bubble = document.createElement('div');
            bubble.className = 'star-item';
            bubble.dataset.path = file.path;
            
            // 随机轨道参数（使用球坐标简化）
            const angle = Math.random() * Math.PI * 2;
            const phi = Math.random() * Math.PI; // 0到π，覆盖整个球面
            const speed = 0.003 + Math.random() * 0.004;
            
            // 初始状态
            bubble.style.opacity = '0';
            bubble.style.transform = 'scale(0)';
            
            // 存储星星的轨道数据
            bubble._starData = {
                angle: angle,
                phi: phi,
                speed: speed,
                paused: false,
                useCached: false,
                file: file,
                cachedX: 0,
                cachedY: 0,
                cachedScale: 1
            };
            
            // 创建80个细小粒子组成泡泡
            for (let i = 0; i < 100; i++) {
                const particle = document.createElement('div');
                particle.className = 'bubble-particle';
                
                const radius = 22 + Math.random() * 8;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.random() * Math.PI;
                
                const x = Math.sin(phi) * Math.cos(theta) * radius;
                const y = Math.sin(phi) * Math.sin(theta) * radius;
                const z = Math.cos(phi) * radius;
                
                particle.style.left = (10 + x) + 'px';
                particle.style.top = (10 + y) + 'px';
                particle.style.animationDelay = (Math.random() * 2) + 's';
                
                bubble.appendChild(particle);
            }
            
            // 从暗到明出现的动画
            setTimeout(() => {
                bubble.style.transition = 'opacity 1s ease-out';
                bubble.style.opacity = '1';
                bubble.style.transform = 'scale(1)';
            }, 100);
            
            // 鼠标交互
            bubble.addEventListener('mouseenter', () => {
                bubble._starData.paused = true;
                bubble._starData.useCached = true;
            });
            
            bubble.addEventListener('mouseleave', () => {
                bubble._starData.paused = false;
                bubble._starData.useCached = false;
            });
            
            // 点击播放音频
            bubble.addEventListener('click', () => {
                playStarAudio(file, bubble);
            });
            
            container.appendChild(bubble);
            starItems.push(bubble);
        }

        function playStarAudio(file, star) {
            if (file.played) return;
            
            // 设置标志，表示泡泡正在播放飞散动画
            star._starData.playing = true;
            
            // 点击泡泡后，粒子向四面八方飞散
            const particles = star.querySelectorAll('.bubble-particle');
            particles.forEach(particle => {
                // 随机方向和速度
                const angle = Math.random() * Math.PI * 2;
                const speed = 2 + Math.random() * 3;
                const distance = 100 + Math.random() * 100;
                
                // 计算目标位置
                const startX = parseFloat(particle.style.left);
                const startY = parseFloat(particle.style.top);
                const endX = startX + Math.cos(angle) * distance;
                const endY = startY + Math.sin(angle) * distance;
                
                // 添加飞散动画
                particle.style.transition = 'all 1s ease-out';
                particle.style.left = endX + 'px';
                particle.style.top = endY + 'px';
                particle.style.opacity = '0';
            });
            
            const audio = new Audio(file.path);
            audio.play().catch(error => {
                console.error('Failed to play audio:', error);
            });
            
            audio.addEventListener('ended', () => {
                file.played = true;
                // 播放完毕后，移除泡泡
                setTimeout(() => {
                    if (star.parentNode) {
                        star.parentNode.removeChild(star);
                    }
                    // 从数组中移除
                    const index = starItems.indexOf(star);
                    if (index > -1) {
                        starItems.splice(index, 1);
                    }
                    // 显示下一个星星
                    showNextStar();
                }, 1000);
            });
        }

        let lastUpdateTime = 0;
        let updateInterval = 16; // 约60fps
        
function updateStars() {
            const now = performance.now();
            
            if (now - lastUpdateTime < updateInterval) {
                starAnimationId = requestAnimationFrame(updateStars);
                return;
            }
            
            lastUpdateTime = now;
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            
            starItems.forEach(star => {
                if (!star._starData) return;
                
                const data = star._starData;
                
                // 如果泡泡正在播放飞散动画，跳过更新
                if (data.playing) return;
                
                // 悬停时直接使用缓存值
                if (data.paused && data.useCached) {
                    star.style.transform = `translate(${data.cachedX - 10}px, ${data.cachedY - 10}px) scale(${data.cachedScale})`;
                    return;
                }
                
                // 正常轨道运动
                data.angle += data.speed;
                
                // 简化的3D球坐标转换
                const r = STAR_ORBIT_RADIUS;
                const x = r * Math.sin(data.phi) * Math.cos(data.angle);
                const z = r * Math.sin(data.phi) * Math.sin(data.angle);
                const y = r * Math.cos(data.phi);
                
                // 简单的投影（透视投影）
                const perspective = 1000;
                const scale = perspective / (perspective + z);
                const screenX = centerX + x * scale * 0.8;
                const screenY = centerY + y * scale * 0.8;
                const displayScale = scale * 0.8;
                
                // 缓存当前位置
                data.cachedX = screenX;
                data.cachedY = screenY;
                data.cachedScale = displayScale;
                
                // 应用变换
                star.style.transform = `translate(${screenX - 10}px, ${screenY - 10}px) scale(${displayScale})`;
                
                // 根据深度调整透明度
                const depthFactor = (z + STAR_ORBIT_RADIUS) / (2 * STAR_ORBIT_RADIUS);
                const opacity = 0.5 + depthFactor * 0.5;
                star.style.opacity = data.paused ? 1 : opacity;
                
                // 更新粒子亮度
                if (Math.floor(now / 64) % 2 === 0) {
                    const particles = star.querySelectorAll('.bubble-particle');
                    particles.forEach(particle => {
                        particle.style.opacity = opacity;
                        if (data.paused) {
                            particle.style.boxShadow = '0 0 15px rgba(255, 255, 255, 1), 0 0 25px rgba(255, 215, 0, 1)';
                        } else {
                            particle.style.boxShadow = `0 0 ${12 * opacity}px rgba(255, 255, 255, ${opacity}), 0 0 ${20 * opacity}px rgba(255, 215, 0, ${opacity * 0.9})`;
                        }
                    });
                }
            });
            
            starAnimationId = requestAnimationFrame(updateStars);
        }

        function showStars() {
            initStarSystem();
            showNextStar();
            // 开始星星运动动画
            if (!starAnimationId) {
                updateStars();
            }
        }

        function hideStars() {
            const container = document.getElementById('stars-container');
            if (container) {
                container.innerHTML = '';
            }
            starItems = [];
            currentStarIndex = 0;
            if (starAnimationId) {
                cancelAnimationFrame(starAnimationId);
                starAnimationId = null;
            }
        }

        function loadModel(url) {
            return new Promise((resolve, reject) => {
                const loader = new THREE.GLTFLoader();
                loader.load(
                    url,
                    (gltf) => {
                        const model = gltf.scene;
                        const points = [];
                        
                        // 递归遍历模型的所有网格
                        model.traverse((child) => {
                            if (child.isMesh) {
                                const geometry = child.geometry;
                                geometry.computeBoundingBox();
                                
                                // 提取顶点数据
                                const positions = geometry.attributes.position.array;
                                for (let i = 0; i < positions.length; i += 3) {
                                    const x = positions[i];
                                    const y = positions[i + 1];
                                    const z = positions[i + 2];
                                    points.push({x, y, z});
                                }
                            }
                        });
                        
                        // 如果顶点数量超过上限，进行采样
                        let sampledPoints = points;
                        if (points.length > MAX_MODEL_PARTICLES) {
                            console.log('Model has too many vertices:', points.length, ', sampling to:', MAX_MODEL_PARTICLES);
                            sampledPoints = [];
                            const step = points.length / MAX_MODEL_PARTICLES;
                            for (let i = 0; i < MAX_MODEL_PARTICLES; i++) {

        function loadGiftBoxModel(url) {
            return new Promise((resolve, reject) => {
                const loader = new THREE.GLTFLoader();
                loader.load(
                    url,
                    (gltf) => {
                        const model = gltf.scene;
                        const points = [];
                        
                        // 递归遍历模型的所有网格
                        model.traverse((child) => {
                            if (child.isMesh) {
                                const geometry = child.geometry;
                                geometry.computeBoundingBox();
                                
                                // 提取顶点数据
                                const positions = geometry.attributes.position.array;
                                for (let i = 0; i < positions.length; i += 3) {
                                    const x = positions[i];
                                    const y = positions[i + 1];
                                    const z = positions[i + 2];
                                    points.push({x, y, z});
                                }
                            }
                        });
                        
                        // 如果顶点数量超过上限，进行采样
                        let sampledPoints = points;
                        if (points.length > MAX_MODEL_PARTICLES) {
                            console.log('Gift box model has too many vertices:', points.length, ', sampling to:', MAX_MODEL_PARTICLES);
                            sampledPoints = [];
                            const step = points.length / MAX_MODEL_PARTICLES;
                            for (let i = 0; i < MAX_MODEL_PARTICLES; i++) {
                                const index = Math.floor(i * step);
                                sampledPoints.push(points[index]);
                            }
                        }
                        
                        // 创建模型数据
                        const modelParticleCount = sampledPoints.length;
                        shapes.giftBox = new Float32Array(modelParticleCount * 3);
                        
                        // 定义旋转角度（弧度）
                        const rotationY = Math.PI / 12; // 15度
                        const rotationX = Math.PI / 12; // 15度
                        
                        for (let i = 0; i < modelParticleCount; i++) {
                            const p = sampledPoints[i];
                            
                            // 应用旋转变换
                            let x = p.x;
                            let y = p.y;
                            let z = p.z;
                            
                            // 绕Y轴旋转
                            const cosY = Math.cos(rotationY);
                            const sinY = Math.sin(rotationY);
                            const tempX = x;
                            x = x * cosY - z * sinY;
                            z = z * cosY + tempX * sinY;
                            
                            // 绕X轴旋转
                            const cosX = Math.cos(rotationX);
                            const sinX = Math.sin(rotationX);
                            const tempY = y;
                            y = y * cosX - z * sinX;
                            z = z * cosX + tempY * sinX;
                            
                            // 缩放和位移
                            shapes.giftBox[i * 3] = x * 45; // 缩放模型（放大45倍）
                            shapes.giftBox[i * 3 + 1] = y * 45 - 20; // 缩放模型并往下移动
                            shapes.giftBox[i * 3 + 2] = z * 45;
                        }
                        
                        console.log('Gift box model loaded successfully, particle count:', modelParticleCount);
                        resolve();
                    },
                    (xhr) => {
                        console.log((xhr.loaded / xhr.total * 100) + '% loaded');
                    },
                    (error) => {
                        console.error('An error happened while loading the gift box model:', error);
                        reject(error);
                    }
                );
            });
        }

        function generateCubeData() {
            const outerSize = CUBE_SIZE;
            const innerSize = CUBE_SIZE * 0.7;
            const outerDensity = 1.2; // 外层棱边密度
            const innerDensity = 1.5;   // 内层粒子密度
            
            let index = 0;
            
            // 生成外层棱边粒子
            const edgePoints = [];
            
            // 顶面和底面的边
            for (let x = -outerSize; x <= outerSize; x += outerDensity) {
                // 顶面
                edgePoints.push({x, y: outerSize, z: -outerSize});
                edgePoints.push({x, y: outerSize, z: outerSize});
                // 底面
                edgePoints.push({x, y: -outerSize, z: -outerSize});
                edgePoints.push({x, y: -outerSize, z: outerSize});
            }
            
            for (let z = -outerSize; z <= outerSize; z += outerDensity) {
                // 顶面
                edgePoints.push({x: -outerSize, y: outerSize, z});
                edgePoints.push({x: outerSize, y: outerSize, z});
                // 底面
                edgePoints.push({x: -outerSize, y: -outerSize, z});
                edgePoints.push({x: outerSize, y: -outerSize, z});
            }
            
            // 四个侧面的垂直边
            for (let y = -outerSize; y <= outerSize; y += outerDensity) {
                edgePoints.push({x: -outerSize, y, z: -outerSize});
                edgePoints.push({x: outerSize, y, z: -outerSize});
                edgePoints.push({x: -outerSize, y, z: outerSize});
                edgePoints.push({x: outerSize, y, z: outerSize});
            }
            
            // 创建立方体数据
            shapes.cube = new Float32Array(currentParticleCount * 3);
            
            // 添加外层棱边粒子
            for (let i = 0; i < edgePoints.length && index < currentParticleCount; i++) {
                const p = edgePoints[i];
                shapes.cube[index * 3] = p.x;
                shapes.cube[index * 3 + 1] = p.y;
                shapes.cube[index * 3 + 2] = p.z;
                index++;
            }
            
            // 生成内层粒子方块 - 确保三维均匀分布
            // 计算内层粒子数量，确保三个维度均匀
            const innerParticles = currentParticleCount - index;
            const side = Math.max(2, Math.ceil(Math.cbrt(innerParticles))); // 确保side至少为2
            const step = (innerSize * 2) / (side - 1);
            
            // 确保三个维度都有足够的粒子
            let x = 0, y = 0, z = 0;
            while (index < currentParticleCount) {
                const px = -innerSize + x * step;
                const py = -innerSize + y * step;
                const pz = -innerSize + z * step;
                shapes.cube[index * 3] = px;
                shapes.cube[index * 3 + 1] = py;
                shapes.cube[index * 3 + 2] = pz;
                index++;
                
                // 三维循环
                z++;
                if (z >= side) {
                    z = 0;
                    y++;
                    if (y >= side) {
                        y = 0;
                        x++;
                        if (x >= side) {
                            break;
                        }
                    }
                }
            }
            
            // 确保所有粒子位置都被初始化
            for (let i = index; i < currentParticleCount; i++) {
                // 用随机位置填充剩余粒子
                const x = (Math.random() - 0.5) * innerSize * 2;
                const y = (Math.random() - 0.5) * innerSize * 2;
                const z = (Math.random() - 0.5) * innerSize * 2;
                shapes.cube[i * 3] = x;
                shapes.cube[i * 3 + 1] = y;
                shapes.cube[i * 3 + 2] = z;
            }
        }

        function generateGiftData() {
            const size = CUBE_SIZE;
            const ribbonWidth = 3;
            const bowSize = 8;
            const edgeDensity = 0.6; // 边缘密度
            const faceDensity = 1.2; // 面密度
            const ribbonDensity = 0.6; // 丝带密度
            const bowDensity = 0.3; // 蝴蝶结密度
            
            const points = [];
            
            // 生成礼物盒主体 - 边缘高亮
            // 12条棱边
            const edges = [
                // 顶面棱边
                {start: {x: -size, y: size, z: -size}, end: {x: size, y: size, z: -size}},
                {start: {x: size, y: size, z: -size}, end: {x: size, y: size, z: size}},
                {start: {x: size, y: size, z: size}, end: {x: -size, y: size, z: size}},
                {start: {x: -size, y: size, z: size}, end: {x: -size, y: size, z: -size}},
                // 底面棱边
                {start: {x: -size, y: -size, z: -size}, end: {x: size, y: -size, z: -size}},
                {start: {x: size, y: -size, z: -size}, end: {x: size, y: -size, z: size}},
                {start: {x: size, y: -size, z: size}, end: {x: -size, y: -size, z: size}},
                {start: {x: -size, y: -size, z: size}, end: {x: -size, y: -size, z: -size}},
                // 侧面棱边
                {start: {x: -size, y: -size, z: -size}, end: {x: -size, y: size, z: -size}},
                {start: {x: size, y: -size, z: -size}, end: {x: size, y: size, z: -size}},
                {start: {x: size, y: -size, z: size}, end: {x: size, y: size, z: size}},
                {start: {x: -size, y: -size, z: size}, end: {x: -size, y: size, z: size}}
            ];
            
            // 生成棱边粒子
            for (const edge of edges) {
                const length = Math.sqrt(
                    Math.pow(edge.end.x - edge.start.x, 2) +
                    Math.pow(edge.end.y - edge.start.y, 2) +
                    Math.pow(edge.end.z - edge.start.z, 2)
                );
                const steps = Math.ceil(length / edgeDensity);
                for (let i = 0; i <= steps; i++) {
                    const t = i / steps;
                    const x = edge.start.x + (edge.end.x - edge.start.x) * t;
                    const y = edge.start.y + (edge.end.y - edge.start.y) * t;
                    const z = edge.start.z + (edge.end.z - edge.start.z) * t;
                    points.push({x, y, z});
                }
            }
            
            // 生成礼物盒面
            // 顶面
            for (let x = -size + edgeDensity; x < size; x += faceDensity) {
                for (let z = -size + edgeDensity; z < size; z += faceDensity) {
                    points.push({x, y: size, z});
                }
            }
            // 前面
            for (let x = -size + edgeDensity; x < size; x += faceDensity) {
                for (let y = -size + edgeDensity; y < size; y += faceDensity) {
                    points.push({x, y, z: size});
                }
            }
            // 右面
            for (let y = -size + edgeDensity; y < size; y += faceDensity) {
                for (let z = -size + edgeDensity; z < size; z += faceDensity) {
                    points.push({x: size, y, z});
                }
            }
            
            // 生成丝带
            // 横向丝带（Y=0）
            for (let x = -size; x <= size; x += ribbonDensity) {
                for (let z = -size; z <= size; z += ribbonDensity) {
                    if (Math.abs(x) <= ribbonWidth || Math.abs(z) <= ribbonWidth) {
                        points.push({x, y: 0, z});
                    }
                }
            }
            
            // 纵向丝带（X=0）
            for (let y = -size; y <= size; y += ribbonDensity) {
                for (let z = -size; z <= size; z += ribbonDensity) {
                    if (Math.abs(y) <= ribbonWidth || Math.abs(z) <= ribbonWidth) {
                        points.push({x: 0, y, z});
                    }
                }
            }
            
            // 生成蝴蝶结
            // 蝴蝶结主体
            for (let angle = 0; angle < Math.PI * 2; angle += bowDensity) {
                const r = bowSize * 0.8;
                const x = r * Math.cos(angle);
                const y = size + bowSize * 0.5 + r * Math.sin(angle) * 0.5;
                const z = 0;
                points.push({x, y, z});
            }
            
            // 蝴蝶结丝带
            for (let angle = 0; angle < Math.PI; angle += bowDensity * 0.5) {
                const r = bowSize * 1.2;
                const x = r * Math.cos(angle);
                const y = size + bowSize * 0.5;
                const z = r * Math.sin(angle);
                points.push({x, y, z});
                points.push({x: -x, y, z});
            }
            
            // 蝴蝶结中心
            for (let r = 0; r < bowSize * 0.3; r += bowDensity) {
                for (let angle = 0; angle < Math.PI * 2; angle += bowDensity) {
                    const x = r * Math.cos(angle);
                    const y = size + bowSize * 0.5;
                    const z = r * Math.sin(angle);
                    points.push({x, y, z});
                }
            }
            
            // 创建礼物盒数据
            const giftParticleCount = points.length;
            shapes.gift = new Float32Array(giftParticleCount * 3);
            
            for (let i = 0; i < giftParticleCount; i++) {
                const p = points[i];
                shapes.gift[i * 3] = p.x;
                shapes.gift[i * 3 + 1] = p.y;
                shapes.gift[i * 3 + 2] = p.z;
            }
        }

        function generateNumberData(num, key) {
            const canvas = document.createElement('canvas');
            canvas.width = 128;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'white';
            ctx.font = 'bold 100px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(num.toString(), 64, 64);

            const imgData = ctx.getImageData(0, 0, 128, 128).data;
            const points = [];
            for (let i = 0; i < imgData.length; i += 4) {
                if (imgData[i] > 128) {
                    const px = (i / 4) % 128;
                    const py = Math.floor((i / 4) / 128);
                    points.push({ x: (px - 64) * 0.8, y: (64 - py) * 0.8 });
                }
            }

            // 创建数字数据
            const numberParticleCount = points.length || 1000; // 确保至少有1000个粒子
            const data = new Float32Array(numberParticleCount * 3);

            // 确保points不为空
            if (points.length === 0) {
                // 如果没有点，生成随机位置
                for (let i = 0; i < numberParticleCount; i++) {
                    data[i * 3] = (Math.random() - 0.5) * 50;
                    data[i * 3 + 1] = (Math.random() - 0.5) * 50;
                    data[i * 3 + 2] = (Math.random() - 0.5) * 5;
                }
            } else {
                for (let i = 0; i < numberParticleCount; i++) {
                    const p = points[i % points.length];
                    data[i * 3] = p.x + (Math.random() - 0.5) * 2;
                    data[i * 3 + 1] = p.y + (Math.random() - 0.5) * 2;
                    data[i * 3 + 2] = (Math.random() - 0.5) * 5; 
                }
            }
            shapes[key] = data;
        }

        function generateExplodeData() {
            shapes.explode = new Float32Array(currentParticleCount * 3);
            for (let i = 0; i < currentParticleCount; i++) {
                const radius = 120 + Math.random() * 40;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.random() * Math.PI;
                shapes.explode[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
                shapes.explode[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
                shapes.explode[i * 3 + 2] = radius * Math.cos(phi);
            }
        }

                    }
                    
                    // 3秒后切换到模型形态
                    setTimeout(() => {

                    }, 3000);

                    // 先让第二系统的所有粒子随机向外飞散
                    const posAttr2 = geometry2.attributes.position;
                    const count2 = currentParticleCount2;
                    
                    for (let i = 0; i < count2; i++) {
                        const currentX = posAttr2.array[i * 3];
                        const currentY = posAttr2.array[i * 3 + 1];
                        const currentZ = posAttr2.array[i * 3 + 2];
                        
                        new TWEEN.Tween(posAttr2.array)

                                [i * 3]: currentX + (Math.random() - 0.5) * 500,
                                [i * 3 + 1]: currentY + (Math.random() - 0.5) * 500,
                                [i * 3 + 2]: currentZ + (Math.random() - 0.5) * 500
                            }, 3000)
                            .easing(TWEEN.Easing.Exponential.Out)
                            .start();

                    // 3秒后切换到礼物盒形态

        function onDocumentMouseDown(event) {
            if (isTransitioning) return;
            if (currentState2 === 'gift' || currentState2 === 'model') {
                // 检查是否可以进入倒计时
                if (canEnterCountdown()) {
                    startCountdownSequence();
                }
            } else if (currentState2 === 'giftBox' || currentState2 === 'candle') {
                // 点击礼物盒或蜡烛时调用启航功能
                onStart();
            }
        }

        function onDocumentMouseMove(event) {
            mouseX = (event.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(event.clientY / window.innerHeight) * 2 + 1;
        }

        function morphTo(targetKey, duration = DURATION, easing = TWEEN.Easing.Exponential.InOut) {
            isTransitioning = true;
            const targetData = shapes[targetKey];
            const targetParticleCount = targetData.length / 3;
            
            // 如果目标形态的粒子数量不同，更新粒子系统
            if (targetParticleCount !== currentParticleCount) {
                updateParticleSystem(targetParticleCount);
                // 重新生成当前形态的数据
                if (targetKey === 'random') generateRandomData();
                else if (targetKey === 'cube') generateCubeData();
                else if (targetKey === 'gift') generateGiftData();
                else if (targetKey === 'model') {
                    // 模型数据已经在loadModel函数中生成
                }
                else if (targetKey === 'number3') generateNumberData(3, 'number3');
                else if (targetKey === 'number2') generateNumberData(2, 'number2');
                else if (targetKey === 'number1') generateNumberData(1, 'number1');
                else if (targetKey === 'explode') generateExplodeData();
            }
            
            // 调整粒子大小
            if (targetKey === 'model') {
                material.size = 1.5; // 模型时粒子大小缩小2倍
            } else {
                material.size = 3; // 其他形态恢复默认大小
            }
            
            const posAttr = geometry.attributes.position;
            const targetDataUpdated = shapes[targetKey];
            
            let completed = 0;
            const count = currentParticleCount;
            
            for (let i = 0; i < count; i++) {
                new TWEEN.Tween(posAttr.array)
                    .to({
                        [i * 3]: targetDataUpdated[i * 3],
                        [i * 3 + 1]: targetDataUpdated[i * 3 + 1],
                        [i * 3 + 2]: targetDataUpdated[i * 3 + 2]
                    }, duration)
                    .easing(easing)
                    .onComplete(() => {
                        completed++;
                        if (completed === count) {
                            isTransitioning = false;
                            currentState = targetKey;
                        }
                    })
                    .start();
            }
            
            const updateTask = setInterval(() => {
                posAttr.needsUpdate = true;
                if (completed >= count) clearInterval(updateTask);
            }, 16);
        }

        let currentState2 = 'random';

        function morphTo2(targetKey, duration = DURATION, easing = TWEEN.Easing.Exponential.InOut) {
            isTransitioning = true;
            const targetData = shapes[targetKey];
            const targetParticleCount = targetData.length / 3;
            const currentCount = currentParticleCount2;
            
            // 调整粒子大小
            if (targetKey === 'model' || targetKey === 'giftBox' || targetKey === 'candle') {
                material2.size = 1.5;
            } else {
                material2.size = 3;
            }
            
            const posAttr2 = geometry2.attributes.position;
            let completed = 0;
            
            if (targetParticleCount > currentCount) {
                // 需要更多粒子，更新粒子系统数量
                updateParticleSystem2(targetParticleCount);
                
                // 重新获取position attribute
                const newPosAttr2 = geometry2.attributes.position;
                
                // 原有粒子平滑过渡到新位置
                for (let i = 0; i < currentCount; i++) {
                    new TWEEN.Tween(newPosAttr2.array)
                        .to({
                            [i * 3]: targetData[i * 3],
                            [i * 3 + 1]: targetData[i * 3 + 1],
                            [i * 3 + 2]: targetData[i * 3 + 2]
                        }, duration)
                        .easing(easing)
                        .onComplete(() => {
                            completed++;
                            if (completed === targetParticleCount) {
                                currentState2 = targetKey;
                                isTransitioning = false;
                            }
                        })
                        .start();
                }
                
                // 新增的粒子从远处聚拢
                for (let i = currentCount; i < targetParticleCount; i++) {
                    const targetX = targetData[i * 3];
                    const targetY = targetData[i * 3 + 1];
                    const targetZ = targetData[i * 3 + 2];
                    
                    // 从远处随机位置开始
                    const startX = targetX + (Math.random() - 0.5) * 500;
                    const startY = targetY + (Math.random() - 0.5) * 500;
                    const startZ = targetZ + (Math.random() - 0.5) * 500;
                    
                    newPosAttr2.array[i * 3] = startX;
                    newPosAttr2.array[i * 3 + 1] = startY;
                    newPosAttr2.array[i * 3 + 2] = startZ;
                    
                    new TWEEN.Tween(newPosAttr2.array)
                        .to({
                            [i * 3]: targetX,
                            [i * 3 + 1]: targetY,
                            [i * 3 + 2]: targetZ
                        }, duration)
                        .easing(easing)
                        .onComplete(() => {
                            completed++;
                            if (completed === targetParticleCount) {
                                currentState2 = targetKey;
                                isTransitioning = false;
                            }
                        })
                        .start();
                }
                
                const updateTask = setInterval(() => {
                    newPosAttr2.needsUpdate = true;
                    if (completed >= targetParticleCount) clearInterval(updateTask);
                }, 16);
                
            } else if (targetParticleCount < currentCount) {
                // 需要更少粒子，将多余粒子平滑消除
                for (let i = 0; i < targetParticleCount; i++) {
                    new TWEEN.Tween(posAttr2.array)
                        .to({
                            [i * 3]: targetData[i * 3],
                            [i * 3 + 1]: targetData[i * 3 + 1],
                            [i * 3 + 2]: targetData[i * 3 + 2]
                        }, duration)
                        .easing(easing)
                        .onComplete(() => {
                            completed++;
                            if (completed === currentCount) {
                                // 所有动画完成后，更新粒子系统数量
                                updateParticleSystem2(targetParticleCount);
                                currentState2 = targetKey;
                                isTransitioning = false;
                            }
                        })
                        .start();
                }
                
                // 多余的粒子飞散到远处
                for (let i = targetParticleCount; i < currentCount; i++) {
                    const currentX = posAttr2.array[i * 3];
                    const currentY = posAttr2.array[i * 3 + 1];
                    const currentZ = posAttr2.array[i * 3 + 2];
                    
                    new TWEEN.Tween(posAttr2.array)
                        .to({
                            [i * 3]: currentX + (Math.random() - 0.5) * 500,
                            [i * 3 + 1]: currentY + (Math.random() - 0.5) * 500,
                            [i * 3 + 2]: currentZ + (Math.random() - 0.5) * 500
                        }, duration)
                        .easing(easing)
                        .onComplete(() => {
                            completed++;
                            if (completed === currentCount) {
                                // 所有动画完成后，更新粒子系统数量
                                updateParticleSystem2(targetParticleCount);
                                currentState2 = targetKey;
                                isTransitioning = false;
                            }
                        })
                        .start();
                }
                
                const updateTask = setInterval(() => {
                    posAttr2.needsUpdate = true;
                    if (completed >= currentCount) clearInterval(updateTask);
                }, 16);
                
            } else {
                // 粒子数量相同，直接平滑过渡
                for (let i = 0; i < currentCount; i++) {
                    new TWEEN.Tween(posAttr2.array)
                        .to({
                            [i * 3]: targetData[i * 3],
                            [i * 3 + 1]: targetData[i * 3 + 1],
                            [i * 3 + 2]: targetData[i * 3 + 2]
                        }, duration)
                        .easing(easing)
                        .onComplete(() => {
                            completed++;
                            if (completed === currentCount) {
                                currentState2 = targetKey;
                                isTransitioning = false;
                            }
                        })
                        .start();
                }
                
                const updateTask = setInterval(() => {
                    posAttr2.needsUpdate = true;
                    if (completed >= currentCount) clearInterval(updateTask);
                }, 16);
            }
        }

        async function startCountdownSequence() {
            isTransitioning = true;
            document.getElementById('hint').style.display = 'none';
            hideDanmaku();
            hideStars(); // 隐藏星星系统

            // 重置第二个粒子系统旋转角度为0，确保倒计时开始时是正位
            if (particles2) {
                particles2.rotation.set(0, 0, 0);
            }

            // 开始从左往右的旋转动画
            let rotationDirection = 1; // 1表示向右，-1表示向左
            let rotationAngle = 0;
            const maxAngle = Math.PI / 6; // 30度
            const rotationSpeed = 0.005;

            // 倒计时过程中的旋转动画
            const rotationInterval = setInterval(() => {
                rotationAngle += rotationSpeed * rotationDirection;
                if (Math.abs(rotationAngle) >= maxAngle) {
                    rotationDirection *= -1;
                }
                if (particles2) {
                    particles2.rotation.y = rotationAngle;
                }
            }, 16);

            for (let i = 3; i >= 1; i--) {
                // 1. 迅速散开
                await performMorph2('explode', 400, TWEEN.Easing.Quadratic.Out);
                
                // 2. 汇聚成数字
                await performMorph2('number' + i, 500, TWEEN.Easing.Back.Out);
                // 停留一会
                await new Promise(r => setTimeout(r, 800));
            }

            // 停止旋转动画
            clearInterval(rotationInterval);

            // 倒计时结束后，第二系统的粒子飞散
            const posAttr2 = geometry2.attributes.position;
            const count2 = currentParticleCount2;
            
            for (let i = 0; i < count2; i++) {
                const currentX = posAttr2.array[i * 3];
                const currentY = posAttr2.array[i * 3 + 1];
                const currentZ = posAttr2.array[i * 3 + 2];
                
                new TWEEN.Tween(posAttr2.array)
                    .to({
                        [i * 3]: currentX + (Math.random() - 0.5) * 500,
                        [i * 3 + 1]: currentY + (Math.random() - 0.5) * 500,
                        [i * 3 + 2]: currentZ + (Math.random() - 0.5) * 500
                    }, 2000)
                    .easing(TWEEN.Easing.Exponential.Out)
                    .start();
            }
            
            // 显示"再次启航"按钮
            document.getElementById('start-btn').style.display = 'block';
            document.getElementById('start-btn').innerText = '再次启航';
            document.getElementById('hint').style.display = 'none';
            hideStars(); // 隐藏星星系统
            showDanmaku();
            isTransitioning = false;
        }

        function performMorph(targetKey, duration, easing) {
            return new Promise(resolve => {
                const targetData = shapes[targetKey];
                const targetParticleCount = targetData.length / 3;
                
                // 如果目标形态的粒子数量不同，更新粒子系统
                if (targetParticleCount !== currentParticleCount) {
                    updateParticleSystem(targetParticleCount);
                    // 重新生成当前形态的数据
                    if (targetKey === 'random') generateRandomData();
                    else if (targetKey === 'cube') generateCubeData();
                    else if (targetKey === 'gift') generateGiftData();
                    else if (targetKey === 'model') {
                        // 模型数据已经在loadModel函数中生成
                    }
                    else if (targetKey === 'number3') generateNumberData(3, 'number3');
                    else if (targetKey === 'number2') generateNumberData(2, 'number2');
                    else if (targetKey === 'number1') generateNumberData(1, 'number1');
                    else if (targetKey === 'explode') generateExplodeData();
                }
                
                // 调整粒子大小
                if (targetKey === 'model') {
                    material.size = 1.5;
                } else {
                    material.size = 3;
                }
                
                const posAttr = geometry.attributes.position;
                const targetDataUpdated = shapes[targetKey];
                let completed = 0;
                const count = currentParticleCount;
                
                for (let i = 0; i < count; i++) {
                    new TWEEN.Tween(posAttr.array)
                        .to({
                            [i * 3]: targetDataUpdated[i * 3],
                            [i * 3 + 1]: targetDataUpdated[i * 3 + 1],
                            [i * 3 + 2]: targetDataUpdated[i * 3 + 2]
                        }, duration)
                        .easing(easing)
                        .onComplete(() => {
                            completed++;
                            if (completed === count) {
                                currentState = targetKey;
                                resolve();
                            }
                        })
                        .start();
                }
                
                const updateTask = setInterval(() => {
                    posAttr.needsUpdate = true;
                    if (completed >= count) clearInterval(updateTask);
                }, 16);
            });
        }

        function performMorph2(targetKey, duration, easing) {
            return new Promise(resolve => {
                const targetData = shapes[targetKey];
                const targetParticleCount = targetData.length / 3;
                
                // 如果目标形态的粒子数量不同，更新粒子系统
                if (targetParticleCount !== currentParticleCount2) {
                    updateParticleSystem2(targetParticleCount);
                    // 重新生成当前形态的数据
                    if (targetKey === 'random') generateRandomData();
                    else if (targetKey === 'cube') generateCubeData();
                    else if (targetKey === 'gift') generateGiftData();
                    else if (targetKey === 'model') {
                        // 模型数据已经在loadModel函数中生成
                    }
                    else if (targetKey === 'number3') generateNumberData(3, 'number3');
                    else if (targetKey === 'number2') generateNumberData(2, 'number2');
                    else if (targetKey === 'number1') generateNumberData(1, 'number1');
                    else if (targetKey === 'explode') generateExplodeData();
                }
                
                // 调整粒子大小
                if (targetKey === 'model') {
                    material2.size = 1.5;
                } else {
                    material2.size = 3;
                }
                
                const posAttr2 = geometry2.attributes.position;
                const targetDataUpdated = shapes[targetKey];
                
                let completed = 0;
                const count = currentParticleCount2;
                
                for (let i = 0; i < count; i++) {
                    new TWEEN.Tween(posAttr2.array)
                        .to({
                            [i * 3]: targetDataUpdated[i * 3],
                            [i * 3 + 1]: targetDataUpdated[i * 3 + 1],
                            [i * 3 + 2]: targetDataUpdated[i * 3 + 2]
                        }, duration)
                        .easing(easing)
                        .onComplete(() => {
                            completed++;
                            if (completed === count) {
                                currentState2 = targetKey;
                                resolve();
                            }
                        })
                        .start();
                }
                
                const updateTask = setInterval(() => {
                    posAttr2.needsUpdate = true;
                    if (completed >= count) clearInterval(updateTask);
                }, 16);
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate(time) {
            requestAnimationFrame(animate);
            TWEEN.update(time);
            // 每100帧打印一次调试信息
            if (time % 100 === 0) {
                console.log('Animate function running, current state:', currentState);
            }

            // RGB呼吸霓虹灯效果
            const colorArray = geometry.attributes.color.array;
            for (let i = 0; i < currentParticleCount; i++) {
                const offset = i * 3;
                const phase = time * 0.001 + i * 0.1;
                colorArray[offset] = 0.5 + 0.5 * Math.sin(phase);          // R
                colorArray[offset + 1] = 0.5 + 0.5 * Math.sin(phase + 2);    // G
                colorArray[offset + 2] = 0.5 + 0.5 * Math.sin(phase + 4);    // B
            }
            geometry.attributes.color.needsUpdate = true;
            
            // 第二个粒子系统的RGB呼吸霓虹灯效果
            if (particles2 && particles2.visible) {
                const colorArray2 = geometry2.attributes.color.array;
                for (let i = 0; i < currentParticleCount2; i++) {
                    const offset = i * 3;
                    const phase = time * 0.001 + i * 0.1;
                    colorArray2[offset] = 0.5 + 0.5 * Math.sin(phase);          // R
                    colorArray2[offset + 1] = 0.5 + 0.5 * Math.sin(phase + 2);    // G
                    colorArray2[offset + 2] = 0.5 + 0.5 * Math.sin(phase + 4);    // B
                }
                geometry2.attributes.color.needsUpdate = true;
            }

            // 第一个粒子系统始终保持random状态的离散粒子效果
            const positionArray = geometry.attributes.position.array;
            for (let i = 0; i < currentParticleCount; i++) {
                positionArray[i * 3] += Math.sin(time * 0.001 + i) * 0.03;
                positionArray[i * 3 + 1] += Math.cos(time * 0.0012 + i) * 0.03;
                positionArray[i * 3 + 2] += Math.sin(time * 0.0013 + i) * 0.03;
            }
            geometry.attributes.position.needsUpdate = true;
            particles.rotation.y += 0.005;
            particles.rotation.x += 0.002;

            // 第二个粒子系统根据当前状态进行不同的旋转
            if (particles2 && particles2.visible) {
                if (currentState2 === 'random') {
                    const positionArray2 = geometry2.attributes.position.array;
                    for (let i = 0; i < currentParticleCount2; i++) {
                        positionArray2[i * 3] += Math.sin(time * 0.001 + i) * 0.03;
                        positionArray2[i * 3 + 1] += Math.cos(time * 0.0012 + i) * 0.03;
                        positionArray2[i * 3 + 2] += Math.sin(time * 0.0013 + i) * 0.03;
                    }
                    geometry2.attributes.position.needsUpdate = true;
                    particles2.rotation.y += 0.005;
                    particles2.rotation.x += 0.002;
                } else if (currentState2 === 'cube') {
                    particles2.rotation.y += 0.005;
                    particles2.rotation.x += 0.002;
                } else if (currentState2 === 'gift') {
                    particles2.rotation.y += 0.005;
                    particles2.rotation.x += 0.002;
                } else if (currentState2 === 'model') {
                    particles2.rotation.y += 0.005;
                } else if (currentState2 === 'candle') {
                    particles2.rotation.y += 0.005;
                } else if (currentState2.includes('number')) {
                    // 数字显示时，允许通过外部设置的旋转角度
                }
            }

// 模型跟随鼠标旋转（根据配置表参数）
            if (particles2 && particles2.visible) {
                const config = mouseRotationConfig[currentState2] || mouseRotationConfig.default;
                targetRotationY = mouseX * config.sensitivityX;
                targetRotationX = -mouseY * config.sensitivityY;
                particles2.rotation.y += (targetRotationY - particles2.rotation.y) * config.lerpFactor;
                particles2.rotation.x += (targetRotationX - particles2.rotation.x) * config.lerpFactor;
                geometry2.attributes.position.needsUpdate = true;
            }

            renderer.render(scene, camera);
        }
    </script>
